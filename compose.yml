services:
  api:
    build: ./services/api
    environment:
      PAPERDIFF_ENV: development
      PAPERDIFF_DEMO_MODE: "true"
      PAPERDIFF_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      LINKUP_API_KEY: ${LINKUP_API_KEY:-}
      ROCKETRIDE_APIKEY: ${ROCKETRIDE_APIKEY:-}
    ports:
      - "8000:8000"

  web:
    build: ./apps/web
    depends_on:
      - api
    ports:
      - "8080:80"

