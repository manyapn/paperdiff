  <script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    if (!doc.title) doc.title = 'PaperDiff';
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

span>\n                <span style=\"font-size:12px;font-weight:500;color:{{ row.chipColor }};background:{{ row.chipBg }};border-radius:99px;padding:2.5px 10px;white-space:nowrap\">{{ row.stateLabel }}<\u002Fspan>\n                <span style=\"flex:1;font-size:13px;color:#8A95A6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ row.teaser }}<\u002Fspan>\n                <span style=\"font-size:12px;font-weight:500;color:{{ row.groundColor }};background:{{ row.groundBg }};border-radius:99px;padding:2.5px 10px;white-space:nowrap\">{{ row.ground }}<\u002Fspan>\n                <span style=\"color:#8A95A6;font-size:12px;transform:{{ row.chev }};transition:transform 180ms ease-out\">▾<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ row.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"border-top:1px solid #EFF2F6;padding:18px;animation:pd-fadeup 200ms ease-out\">\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr 0.9fr;gap:18px;align-items:start\">\n                    <div sc-camel-on-click=\"{{ row.onOpen }}\" style=\"background:#F7F9FC;border:1px solid #DCE3EC;border-radius:9px;padding:13px 15px;cursor:pointer\" style-hover=\"border-color:#2357D9;background:#F4F7FF\">\n                      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.08em;color:#8A95A6;margin-bottom:6px\">PAPER A<\u002Fdiv>\n                      <div style=\"font-size:14px;line-height:1.5\">{{ row.a }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div sc-camel-on-click=\"{{ row.onOpen }}\" style=\"background:#F7F9FC;border:1px solid #DCE3EC;border-radius:9px;padding:13px 15px;cursor:pointer\" style-hover=\"border-color:#2357D9;background:#F4F7FF\">\n                      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.08em;color:#8A95A6;margin-bottom:6px\">PAPER B<\u002Fdiv>\n                      <div style=\"font-size:14px;line-height:1.5\">{{ row.b }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"padding:2px 2px 0\">\n                      <div style=\"font-size:14px;line-height:1.55;color:#202734\">{{ row.interp }}<\u002Fdiv>\n                      <a href=\"#\" sc-camel-on-click=\"{{ row.onOpen }}\" style=\"display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:13px;font-weight:500\">Open the evidence →<\u002Fa>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <div sc-camel-on-click=\"{{ toggleEq }}\" style=\"background:#EFF2F6;border:1px solid #DCE3EC;border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:14px;cursor:pointer\" style-hover=\"background:#E9EEF5\">\n            <span style=\"width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:13px;background:#FFFFFF;color:#566173\">=<\u002Fspan>\n            <span style=\"font-size:14px;color:#566173\">{{ eqLabel }}<\u002Fspan>\n            <span style=\"flex:1\"><\u002Fspan>\n            <span style=\"font-size:13px;color:#2357D9;font-weight:500\">{{ eqAction }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <section style=\"margin-top:72px;max-width:820px\">\n          <h2 style=\"font-family:'Newsreader',Georgia,serif;font-weight:400;font-size:30px;line-height:1.1;margin:0 0 20px;letter-spacing:-0.01em\">What these papers can honestly be said to show<\u002Fh2>\n          <div style=\"background:#FFFFFF;border:1px solid #DCE3EC;border-radius:12px;padding:26px 30px;box-shadow:0 8px 24px rgba(9,13,20,0.06)\">\n            <p style=\"margin:0;font-size:17px;line-height:1.65;color:#202734\">In UK adolescents aged 13–16, <a href=\"#\" sc-camel-on-click=\"{{ openExposure }}\">device-logged passive social media use<\u002Fa> showed a small same-year association with <a href=\"#\" sc-camel-on-click=\"{{ openOutcome }}\">depressive symptoms<\u002Fa>. In US adults aged 18–24, <a href=\"#\" sc-camel-on-click=\"{{ openExposure }}\">self-reported total screen time<\u002Fa> did not predict <a href=\"#\" sc-camel-on-click=\"{{ openOutcome }}\">clinical depression two years later<\u002Fa>. Neither study tested the other's <a href=\"#\" sc-camel-on-click=\"{{ openPopulation }}\">population<\u002Fa>, exposure, or outcome window.<\u002Fp>\n            <div style=\"display:flex;gap:10px;margin-top:22px;align-items:center;flex-wrap:wrap\">\n              <button sc-camel-on-click=\"{{ copySynthesis }}\" style=\"cursor:pointer;background:#2357D9;border:none;color:#FFFFFF;border-radius:9px;padding:10px 18px;font-size:13.5px;font-weight:500\" style-hover=\"background:#1746B7\">{{ copyLabel }}<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ openPopulation }}\" style=\"cursor:pointer;background:#FFFFFF;border:1px solid #DCE3EC;color:#090D14;border-radius:9px;padding:10px 18px;font-size:13.5px;font-weight:500\" style-hover=\"border-color:#8A95A6\">View supporting passages<\u002Fbutton>\n              <a href=\"#\" style=\"font-size:13px;color:#566173;margin-left:6px\" style-hover=\"color:#1746B7\">Flag an interpretation<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ CHALLENGE : INPUT ============ -->\n  <sc-if value=\"{{ isChallengeInput }}\" hint-placeholder-val=\"{{ false }}\">\n    <main data-screen-label=\"Challenge input\" style=\"flex:1;max-width:760px;width:100%;margin:0 auto;padding:80px 32px 96px;box-sizing:border-box\">\n      <div style=\"text-align:center;margin-bottom:44px\">\n        <h1 style=\"font-family:'Newsreader',Georgia,serif;font-weight:400;font-size:44px;line-height:1.05;margin:0 0 14px;letter-spacing:-0.01em\">Find the evidence that best tests this claim.<\u002Fh1>\n        <p style=\"margin:0;color:#566173;font-size:16px\">Start from one paper. PaperDiff scouts for contradictions, replications, and reassessments — ranked by how fairly they can be compared.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF;border:1px solid #DCE3EC;border-radius:12px;padding:24px;box-shadow:0 8px 24px rgba(9,13,20,0.06)\">\n        <input value=\"{{ chUrl }}\" sc-camel-on-change=\"{{ onChUrl }}\" placeholder=\"Paper URL, DOI, or claim to challenge\" style=\"width:100%;box-sizing:border-box;border:1px solid #DCE3EC;border-radius:9px;padding:12px 14px;font-size:14px;font-family:'IBM Plex Mono',monospace;color:#090D14\">\n        <sc-if value=\"{{ chSrc }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:14px;border-top:1px solid #DCE3EC;padding-top:14px;animation:pd-fadeup 220ms ease-out\">\n            <div style=\"font-size:14px;font-weight:500;line-height:1.4\">{{ chSrc.title }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8A95A6;margin-top:5px\">{{ chSrc.venue }} · {{ chSrc.year }} · {{ chSrc.authors }}<\u002Fdiv>\n            <div style=\"display:inline-flex;align-items:center;gap:6px;margin-top:9px;background:#E9F0FF;color:#1746B7;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:500\">✓ Source verified · claim detected<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;gap:14px;margin-top:32px\">\n        <button sc-camel-on-click=\"{{ startChallenge }}\" disabled=\"{{ challengeDisabled }}\" style=\"border:none;cursor:{{ challengeCursor }};background:{{ challengeBtnBg }};color:{{ challengeBtnColor }};border-radius:9px;padding:13px 26px;font-size:15px;font-weight:500\">Find the strongest challenge<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ loadChDemo }}\" style=\"cursor:pointer;background:#FFFFFF;color:#090D14;border:1px solid #DCE3EC;border-radius:9px;padding:13px 22px;font-size:15px;font-weight:500\" style-hover=\"border-color:#8A95A6\">Use demo paper<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ CHALLENGE : DISCOVERY + CANDIDATES ============ -->\n  <sc-if value=\"{{ isChallengeRun }}\" hint-placeholder-val=\"{{ false }}\">\n    <main data-screen-label=\"Ranked candidates\" style=\"flex:1;max-width:920px;width:100%;margin:0 auto;padding:56px 32px 96px;box-sizing:border-box\">\n      <div style=\"background:#FFFFFF;border:1px solid #DCE3EC;border-radius:12px;padding:18px 20px;margin-bottom:36px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;color:#8A95A6;margin-bottom:8px\">CLAIM UNDER CHALLENGE<\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:500;line-height:1.4\">{{ chSrc.title }}<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8A95A6;margin-top:5px\">{{ chSrc.venue }} · {{ chSrc.year }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:40px\">\n        <sc-for list=\"{{ scoutRows }}\" as=\"s\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:center;gap:10px;background:{{ s.bg }};border:1px solid {{ s.border }};border-radius:12px;padding:12px 15px\">\n            <span style=\"width:18px;height:18px;border-radius:99px;display:grid;place-items:center;font-size:10px;font-weight:600;background:{{ s.iconBg }};color:{{ s.iconColor }};border:1.5px solid {{ s.iconBorder }}\">{{ s.icon }}<\u002Fspan>\n            <span style=\"font-size:13px;font-weight:500;color:{{ s.color }}\">{{ s.label }}<\u002Fspan>\n            <sc-if value=\"{{ s.active }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"flex:1;height:2px;background:#E9F0FF;border-radius:2px;overflow:hidden;position:relative\"><span style=\"position:absolute;inset:0;width:35%;background:#2357D9;animation:pd-line 1.2s linear infinite\"><\u002Fspan><\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ candidatesReady }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"animation:pd-fadeup 260ms ease-out\">\n          <h2 style=\"font-family:'Newsreader',Georgia,serif;font-weight:400;font-size:30px;margin:0 0 6px;letter-spacing:-0.01em\">Three candidates, ranked by comparison fit<\u002Fh2>\n          <p style=\"margin:0 0 26px;color:#566173;font-size:14.5px\">Fit measures methodological comparability — not text similarity.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ candidates }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div style=\"background:#FFFFFF;border:1px solid #DCE3EC;border-radius:12px;padding:20px 22px;box-shadow:0 8px 24px rgba(9,13,20,0.06)\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\">\n                  <span style=\"font-size:12px;font-weight:500;color:{{ c.relColor }};background:{{ c.relBg }};border-radius:99px;padding:3px 11px\">{{ c.rel }}<\u002Fspan>\n                  <span style=\"flex:1\"><\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.04em;color:{{ c.fitColor }}\">FIT · {{ c.fit }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:16px;font-weight:500;line-height:1.35;margin-bottom:4px\">{{ c.title }}<\u002Fdiv>\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8A95A6;margin-bottom:10px\">{{ c.venue }} · {{ c.year }}<\u002Fdiv>\n                <div style=\"font-size:14px;color:#566173;line-height:1.5;margin-bottom:14px\">{{ c.why }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n                  <sc-for list=\"{{ c.dims }}\" as=\"d\" hint-placeholder-count=\"4\">\n                    <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#566173;background:#F7F9FC;border:1px solid #DCE3EC;border-radius:99px;padding:3px 11px\"><span style=\"font-family:'IBM Plex Mono',monospace;color:{{ d.color }}\">{{ d.icon }}<\u002Fspan>{{ d.label }}<\u002Fspan>\n                  <\u002Fsc-for>\n                  <span style=\"flex:1\"><\u002Fspan>\n                  <button sc-camel-on-click=\"{{ c.onCompare }}\" style=\"cursor:pointer;background:#090D14;border:none;color:#FFFFFF;border-radius:9px;padding:9px 17px;font-size:13.5px;font-weight:500\" style-hover=\"background:#2357D9\">Compare this evidence<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ EVIDENCE DRAWER ============ -->\n  <sc-if value=\"{{ drawer }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeDrawer }}\" style=\"position:fixed;inset:0;background:rgba(9,13,20,0.32);z-index:100;transition:opacity 240ms\"><\u002Fdiv>\n    <aside data-screen-label=\"Evidence drawer\" style=\"position:fixed;top:0;right:0;bottom:0;width:460px;max-width:92vw;background:#FFFFFF;z-index:110;box-shadow:0 24px 70px rgba(9,13,20,0.12);display:flex;flex-direction:column;animation:pd-fadeup 240ms ease-out\">\n      <div style=\"padding:20px 24px;border-bottom:1px solid #DCE3EC;display:flex;align-items:flex-start;gap:12px\">\n        <div style=\"flex:1\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:8px\">\n            <span style=\"width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:13px;background:{{ drawer.chipBg }};color:{{ drawer.chipColor }}\">{{ drawer.marker }}<\u002Fspan>\n            <span style=\"font-size:16px;font-weight:600\">{{ drawer.dim }}<\u002Fspan>\n            <span style=\"font-size:12px;font-weight:500;color:{{ drawer.groundColor }};background:{{ drawer.groundBg }};border-radius:99px;padding:2.5px 10px\">{{ drawer.ground }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#566173;line-height:1.5\">{{ drawer.interp }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ closeDrawer }}\" style=\"cursor:pointer;background:none;border:none;font-size:18px;color:#8A95A6;padding:2px 6px\" style-hover=\"color:#090D14\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:22px\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;color:#8A95A6;margin-bottom:12px\">PROVENANCE<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column\">\n            <sc-for list=\"{{ drawer.chain }}\" as=\"step\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:13px\">\n                <div style=\"display:flex;flex-direction:column;align-items:center\">\n                  <span style=\"width:20px;height:20px;border-radius:99px;background:{{ step.bg }};color:{{ step.color }};display:grid;place-items:center;font-size:11px;font-weight:600;border:1.5px solid {{ step.border }}\">{{ step.n }}<\u002Fspan>\n                  <sc-if value=\"{{ step.line }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"width:1.5px;flex:1;background:#DCE3EC;min-height:14px\"><\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"padding-bottom:16px\">\n                  <div style=\"font-size:12px;font-weight:600;color:#566173;margin-bottom:3px\">{{ step.label }}<\u002Fdiv>\n                  <div style=\"font-size:13.5px;line-height:1.55;color:#202734\">{{ step.text }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;color:#8A95A6;margin-bottom:10px\">EXACT PASSAGES<\u002Fdiv>\n          <div style=\"border:1px solid #DCE3EC;border-radius:9px;padding:14px 16px;margin-bottom:10px\">\n            <div style=\"font-size:12px;font-weight:600;color:#566173;margin-bottom:7px\">Paper A · {{ srcA.metaLine }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.7;color:#202734\">{{ drawer.passA.pre }}<span style=\"background:#E9F0FF;color:#1746B7;border-radius:3px;padding:1px 3px\">{{ drawer.passA.span }}<\u002Fspan>{{ drawer.passA.post }}<\u002Fdiv>\n            <a href=\"#\" style=\"display:inline-block;margin-top:9px;font-size:12.5px\">Open at {{ srcA.domain }} ↗<\u002Fa>\n          <\u002Fdiv>\n          <div style=\"border:1px solid #DCE3EC;border-radius:9px;padding:14px 16px\">\n            <div style=\"font-size:12px;font-weight:600;color:#566173;margin-bottom:7px\">Paper B · {{ srcB.metaLine }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.7;color:#202734\">{{ drawer.passB.pre }}<span style=\"background:#E9F0FF;color:#1746B7;border-radius:3px;padding:1px 3px\">{{ drawer.passB.span }}<\u002Fspan>{{ drawer.passB.post }}<\u002Fdiv>\n            <a href=\"#\" style=\"display:inline-block;margin-top:9px;font-size:12.5px\">Open at {{ srcB.domain }} ↗<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        \n<div>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;color:#8A95A6;margin-bottom:10px\">VERIFIER RESULT<\u002Fdiv>\n          <div style=\"font-size:13.5px;line-height:1.6;color:#202734\">{{ drawer.verifier }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F7F9FC;border:1px solid #DCE3EC;border-radius:9px;padding:14px 16px\">\n          <div style=\"font-size:12.5px;font-weight:600;margin-bottom:6px\">Why this changed the verdict<\u002Fdiv>\n          <div style=\"font-size:13.5px;line-height:1.6;color:#566173\">{{ drawer.whyVerdict }}<\u002Fdiv>\n        <\u002Fdiv>\n        <details style=\"border-top:1px solid #DCE3EC;padding-top:14px\">\n          <summary style=\"font-size:13px;color:#566173;cursor:pointer\">Verification details<\u002Fsummary>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.8;color:#8A95A6;margin-top:10px\">entailment: pass · span-align: pass<br>checker: claim-evidence v2 · human review: none<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startScreen&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;input&quot;, &quot;result&quot;, &quot;challenge&quot;], &quot;default&quot;: &quot;input&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Demo&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    mode: 'compare', stage: 'input', helpOpen: false, traceOpen: false,\n    aUrl: '', aClaim: '', aUse: true, bUrl: '', bClaim: '', bUse: true,\n    aResolving: false, bResolving: false, aSrc: null, bSrc: null,\n    steps: [0,0,0,0,0], // 0 pending, 1 active, 2 done\n    drawerKey: null, eqOpen: false, copied: false,\n    chUrl: '', chSrc: null, chStage: 'input', scouts: [0,0,0], candidatesReady: false,\n  };\n\n  demoA = { title: 'Passive social media use and depressive symptoms in UK adolescents: a device-linked cohort of 12,866 teens', venue: 'Lancet Child & Adolescent Health', year: '2023', authors: 'Hartley, Okafor, Lindqvist', passages: 41, short: 'Hartley et al. 2023 — Passive social media use and depressive symptoms in UK adolescents', metaLine: 'Hartley 2023 · §4.2 Results', domain: 'thelancet.com' };\n  demoB = { title: 'Screen time does not predict depression onset in young adults: two-year findings from the RADAR panel', venue: 'Psychological Medicine', year: '2024', authors: 'Moreau, Danziger, Kim', passages: 38, short: 'Moreau et al. 2024 — Screen time does not predict depression onset in young adults', metaLine: 'Moreau 2024 · §3.1 Measures', domain: 'cambridge.org' };\n  demoCh = { title: 'A 20-minute nature walk lowers cortisol more than urban walking: a randomized crossover trial (n=94)', venue: 'Journal of Environmental Psychology', year: '2022', authors: 'Sato, Berglund, Naicker' };\n\n  stepLabels = ['Fetching source passages', 'Extracting comparable fields — Paper A', 'Extracting comparable fields — Paper B', 'Aligning methods and scope', 'Verifying claim–evidence support'];\n\n  rows = [\n    { key: 'population', dim: 'Population', state: 'x', expanded: true, ground: 'Grounded',\n      a: 'UK adolescents aged 13–16, recruited through schools (n = 12,866).',\n      b: 'US adults aged 18–24, national online panel (n = 3,294).',\n      interp: 'No age overlap. Effects of social media on mood are known to differ sharply between adolescence and adulthood.',\n      teaser: 'adolescents 13–16 × adults 18–24',\n      chain: ['Social media harms teenagers\\' mental health.', 'Passive use was associated with higher depressive symptom scores in the same school year.', '\"…passive use in the top quartile was associated with a 0.21 SD higher SMFQ score (95% CI 0.14–0.28)…\"', 'Sample restricted to ages 13–16 at baseline; adult samples were excluded by design.'],\n      passA: { pre: '…participants were ', span: 'aged 13–16 at baseline, recruited across 142 UK secondary schools', post: ', with device-linked usage consent…' },\n      passB: { pre: '…the RADAR panel enrolled ', span: 'adults aged 18–24 residing in the United States', post: ', weighted to census demographics…' },\n      verifier: 'High confidence: both passages state the sampled age range explicitly in the methods sections. The ranges do not overlap.',\n      whyVerdict: 'A claim about adolescents cannot be contradicted by a null result in adults. This difference alone downgrades the conflict from direct to apparent.' },\n    { key: 'exposure', dim: 'Exposure', state: 'x', expanded: true, ground: 'Grounded',\n      a: 'Passive Instagram browsing, device-logged (screen-capture sampling).',\n      b: 'Total self-reported screen time across all apps and devices.',\n      interp: 'One measures a specific behavior objectively; the other aggregates everything and relies on recall, which underestimates heavy use.',\n      teaser: 'passive Instagram, device-logged × total screen time, self-report',\n      chain: ['Both papers are described as studying \"social media use.\"', 'Paper A\\'s effect is specific to passive browsing; Paper B\\'s null covers total screen time.', '\"…exposure was operationalized as minutes of passive Instagram browsing captured via on-device sampling…\"', 'Paper B: \"screen time was assessed with a single self-report item covering all devices.\"'],\n      passA: { pre: '…exposure was operationalized as ', span: 'minutes of passive Instagram browsing, captured via on-device screen sampling', post: ' at 5-minute intervals…' },\n      passB: { pre: '…screen time was assessed with ', span: 'a single self-report item covering all devices and applications', post: ' in the past week…' },\n      verifier: 'High confidence: both operational definitions appear verbatim in the measures sections.',\n      whyVerdict: 'The exposures are not the same construct. A null for total screen time says nothing about passive browsing specifically.' },\n    { key: 'horizon', dim: 'Time horizon', state: 'diff', expanded: true, ground: 'Grounded',\n      a: 'Same-year association: exposure and symptoms measured in one school year.',\n      b: 'Two-year prospective window: exposure at baseline, diagnosis at follow-up.',\n      interp: 'Cross-sectional association and longitudinal prediction can honestly disagree — short-lived effects fade before a two-year follow-up.',\n      teaser: 'same-year ↔ two-year follow-up',\n      chain: ['The headlines imply the same question: \"does social media cause depression?\"', 'Paper A reports a same-year association; Paper B reports two-year prediction.', '\"…symptoms were assessed within the same academic year as exposure measurement…\"', 'Paper B: \"onset was assessed at the 24-month follow-up interview.\"'],\n      passA: { pre: '…symptom scores were assessed ', span: 'within the same academic year as exposure measurement', post: ' (median gap 3.2 months)…' },\n      passB: { pre: '…depression onset was assessed at the ', span: '24-month follow-up interview', post: ' by trained clinicians…' },\n      verifier: 'High confidence: the measurement windows are stated in both procedures sections.',\n      whyVerdict: 'Comparable but distinct windows: the papers could both be right if effects are short-lived. Flagged as material, not incompatible.' },\n    { key: 'question', dim: 'Research question', state: 'diff', expanded: false, ground: 'Grounded',\n      a: 'Is passive use associated with symptom severity right now?',\n      b: 'Does earlier screen time predict later clinical onset?',\n      interp: 'Association versus prediction — related questions, different causal claims.',\n      teaser: 'association ↔ prediction',\n      chain: ['Both are cited as answering whether social media harms mental health.', 'A tests concurrent association; B tests prospective prediction.', '\"…we test whether passive use is associated with concurrent depressive symptoms…\"', 'Paper B frames its aim as \"predicting incident depression from baseline screen time.\"'],\n      passA: { pre: '…we test whether passive use is ', span: 'associated with concurrent depressive symptoms', post: ' in adolescence…' },\n      passB: { pre: '…our aim was ', span: 'predicting incident depression from baseline screen time', post: ' over two years…' },\n      verifier: 'High confidence: both aims are stated in the introductions.',\n      whyVerdict: 'Different question types weaken the appearance of contradiction but are comparable enough to keep in view.' },\n    { key: 'outcome', dim: 'Outcome', state: 'diff', expanded: false, ground: 'Qualified',\n      a: 'Depressive symptom score (SMFQ, self-report continuous scale).',\n      b: 'Clinical depression diagnosis (CIDI structured interview).',\n      interp: 'A symptom score can rise without anyone crossing a diagnostic threshold — both results can hold simultaneously.',\n      teaser: 'symptom score ↔ clinical diagnosis',\n      chain: ['Headlines compress both outcomes to \"depression.\"', 'A measures a continuous symptom scale; B measures diagnosed onset.', '\"…the Short Mood and Feelings Questionnaire (SMFQ) served as the primary outcome…\"', 'Paper B: \"major depressive episode per CIDI interview.\"'],\n      passA: { pre: '…the ', span: 'Short Mood and Feelings Questionnaire (SMFQ)', post: ' served as the primary outcome…' },\n      passB: { pre: '…onset was defined as a ', span: 'major depressive episode per CIDI structured interview', post: ' at follow-up…' },\n      verifier: 'Qualified: Paper B\\'s outcome definition appears fully in the text, but Paper A\\'s scoring cut-offs appear only in a supplementary table.',\n      whyVerdict: 'Sub-threshold symptom increases are consistent with no change in diagnosed onset.' },\n    { key: 'effect', dim: 'Effect / result', state: 'diff', expanded: false, ground: 'Grounded',\n      a: '+0.21 SD symptom score in top quartile of passive use (95% CI 0.14–0.28).',\n      b: 'HR 1.03 for onset per hour of daily screen time (95% CI 0.94–1.13, n.s.).',\n      interp: 'A small significant association and a null hazard ratio — for different exposures, populations, and outcomes.',\n      teaser: '+0.21 SD ↔ HR 1.03 (n.s.)',\n      chain: ['The public framing: \"study finds harm\" versus \"study finds no link.\"', 'Both effect estimates are accurately reported by the headlines.', '\"…0.21 SD higher SMFQ score (95% CI 0.14–0.28)…\"', 'Paper B: \"HR 1.03 (95% CI 0.94–1.13).\"'],\n      passA: { pre: '…top-quartile passive use was associated with a ', span: '0.21 SD higher SMFQ score (95% CI 0.14–0.28)', post: ' after adjustment…' },\n      passB: { pre: '…each additional daily hour yielded an ', span: 'HR of 1.03 (95% CI 0.94–1.13)', post: ' for depression onset…' },\n      verifier: 'High confidence: both estimates match the reported tables exactly.',\n      whyVerdict: 'Both numbers are real. The conflict lives in the scope differences above, not in the arithmetic.' },\n    { key: 'opdef', dim: 'Operational definition', state: 'review', expanded: false, ground: 'Needs review',\n      a: '\"Passive use\" defined via a validated coding scheme (cited, not restated).',\n      b: '\"Screen time\" item wording not reproduced in the paper.',\n      interp: 'Neither paper fully restates its instrument. A human should confirm the definitions before leaning on this row.',\n      teaser: 'instrument wording not fully recoverable',\n      chain: ['Both papers reference measurement instruments by citation.', 'The exact item wording is not present in either full text.', '\"…passive use was coded per the scheme of Verduyn et al. (2017)…\" — the scheme itself is external.', 'Definition resolution requires the cited instruments, which were not fetched.'],\n      passA: { pre: '…passive use was coded per ', span: 'the scheme of Verduyn et al. (2017)', post: ', applied to sampled screenshots…' },\n      passB: { pre: '…screen time was measured with ', span: 'an adapted single item from the ABCD battery', post: ' (wording in codebook)…' },\n      verifier: 'Needs review: the operational wording lives in cited external instruments. PaperDiff does not classify this dimension without them.',\n      whyVerdict: 'Not counted toward the verdict. Shown so the gap is visible rather than silently classified.' },\n  ];\n\n  eqRows = [\n    { key: 'design', dim: 'Study design', a: 'Prospective observational cohort.', b: 'Prospective observational panel.', teaser: 'observational cohort = observational panel' },\n    { key: 'comparator', dim: 'Comparator / control', a: 'Lowest-use quartile as reference.', b: 'Lowest-use tertile as reference.', teaser: 'low-use reference groups' },\n    { key: 'setting', dim: 'Setting', a: 'General population, non-clinical.', b: 'General population, non-clinical.', teaser: 'non-clinical samples' },\n    { key: 'adjust', dim: 'Analysis adjustments', a: 'Adjusted: baseline symptoms, SES, sex.', b: 'Adjusted: baseline symptoms, SES, sex, prior episodes.', teaser: 'comparable covariate sets' },\n    { key: 'limits', dim: 'Limitations declared', a: 'Single-platform exposure; one country.', b: 'Self-report exposure; panel attrition 18%.', teaser: 'both declare measurement limits' },\n  ];\n\n  candidatesData = [\n    { rel: 'Contradictory result', relColor: '#A93F35', relBg: '#FDE7E4', fit: 'HIGH', fitColor: '#1746B7',\n      title: 'Nature exposure and salivary cortisol: no effect of walk environment in a randomized trial (n=210)', venue: 'Health Psychology', year: '2024',\n      why: 'Same intervention (short walks), same biomarker (salivary cortisol), randomized design, larger sample — and a null result.',\n      dims: [ {label:'Population',icon:'=',color:'#566173'}, {label:'Intervention',icon:'=',color:'#566173'}, {label:'Outcome',icon:'=',color:'#566173'}, {label:'Design',icon:'↔',color:'#A65F00'} ] },\n    { rel: 'Direct replication', relColor: '#1746B7', relBg: '#E9F0FF', fit: 'HIGH', fitColor: '#1746B7',\n      title: 'Replicating the nature-walk cortisol effect: a preregistered crossover study in two cities (n=88)', venue: 'Collabra: Psychology', year: '2024',\n      why: 'Preregistered near-exact replication of the original protocol, including walk duration and sampling schedule.',\n      dims: [ {label:'Population',icon:'=',color:'#566173'}, {label:'Intervention',icon:'=',color:'#566173'}, {label:'Outcome',icon:'=',color:'#566173'}, {label:'Design',icon:'=',color:'#566173'} ] },\n    { rel: 'Later reassessment', relColor: '#A65F00', relBg: '#FFF1D6', fit: 'MEDIUM', fitColor: '#A65F00',\n      title: 'Do green-space interventions lower stress biomarkers? A 2025 meta-analysis of 41 trials', venue: 'Psychoneuroendocrinology', year: '2025',\n      why: 'Pools the original trial with 40 others; finds a smaller effect that shrinks further in low-bias studies.',\n      dims: [ {label:'Population',icon:'↔',color:'#A65F00'}, {label:'Intervention',icon:'↔',color:'#A65F00'}, {label:'Outcome',icon:'=',color:'#566173'}, {label:'Design',icon:'×',color:'#A93F35'} ] },\n  ];\n\n  resolve(side) {\n    this.setState({ [side + 'Resolving']: true });\n    clearTimeout(this['t' + side]);\n    this['t' + side] = setTimeout(() => {\n      this.setState({ [side + 'Resolving']: false, [side + 'Src']: side === 'a' ? this.demoA : this.demoB });\n    }, 900);\n  }\n\n  runAnalysis() {\n    this.setState({ mode: 'compare', stage: 'analysis', steps: [1,0,0,0,0], traceOpen: false });\n    const seq = [\n      [700,  [2,1,1,0,0]],\n      [1700, [2,2,1,0,0]],\n      [2100, [2,2,2,1,0]],\n      [3100, [2,2,2,2,1]],\n      [4100, [2,2,2,2,2]],\n    ];\n    seq.forEach(([ms, steps]) => setTimeout(() => this.setState({ steps }), ms));\n    setTimeout(() => this.setState({ stage: 'result', drawerKey: null, eqOpen: false, copied: false }), 4600);\n  }\n\n  runChallenge() {\n    this.setState({ chStage: 'run', scouts: [1,1,1], candidatesReady: false });\n    setTimeout(() => this.setState({ scouts: [2,1,1] }), 1200);\n    setTimeout(() => this.setState({ scouts: [2,2,1] }), 1900);\n    setTimeout(() => this.setState({ scouts: [2,2,2], candidatesReady: true }), 2600);\n  }\n\n  stateStyle(st) {\n    if (st === 'x') return { edge: '#A93F35', chipBg: '#FDE7E4', chipColor: '#A93F35', marker: '×', stateLabel: 'Materially incompatible', borderColor: '#DCE3EC', borderStyle: 'solid' };\n    if (st === 'diff') return { edge: '#A65F00', chipBg: '#FFF1D6', chipColor: '#A65F00', marker: '↔', stateLabel: 'Different, comparable', borderColor: '#DCE3EC', borderStyle: 'solid' };\n    if (st === 'review') return { edge: '#8A95A6', chipBg: '#EFF2F6', chipColor: '#566173', marker: '?', stateLabel: 'Needs review', borderColor: '#8A95A6', borderStyle: 'dashed' };\n    return { edge: '#DCE3EC', chipBg: '#EFF2F6', chipColor: '#566173', marker: '=', stateLabel: 'Materially equivalent', borderColor: '#DCE3EC', borderStyle: 'solid' };\n  }\n\n  groundStyle(g) {\n    if (g === 'Grounded') return { groundBg: '#E9F0FF', groundColor: '#1746B7' };\n    if (g === 'Qualified') return { groundBg: '#FFF1D6', groundColor: '#A65F00' };\n    return { groundBg: '#EFF2F6', groundColor: '#566173' };\n  }\n\n  makeRow(r) {\n    const st = this.stateStyle(r.state || 'eq');\n    const g = this.groundStyle(r.ground || 'Grounded');\n    const expanded = this.state['exp_' + r.key] !== undefined ? this.state['exp_' + r.key] : !!r.expanded;\n    return { ...r, ...st, ...g, ground: r.ground || 'Grounded', expanded,\n      chev: expanded ? 'rotate(180deg)' : 'none',\n      onToggle: () => this.setState({ ['exp_' + r.key]: !expanded }),\n      onOpen: (e) => { e && e.preventDefault && e.preventDefault(); e && e.stopPropagation && e.stopPropagation(); this.setState({ drawerKey: r.key }); } };\n  }\n\n  makeStep(labels, states, i) {\n    const s = states[i];\n    return { label: labels[i], active: s === 1, detail: s === 2 ? 'done' : null,\n      icon: s === 2 ? '✓' : String(i + 1),\n      bg: s === 1 ? '#FFFFFF' : (s === 2 ? '#FFFFFF' : '#F7F9FC'),\n      border: s === 1 ? '#2357D9' : '#DCE3EC',\n      color: s === 0 ? '#8A95A6' : '#090D14',\n      iconBg: s === 2 ? '#2357D9' : '#FFFFFF', iconColor: s === 2 ? '#FFFFFF' : (s === 1 ? '#2357D9' : '#8A95A6'),\n      iconBorder: s === 2 ? '#2357D9' : (s === 1 ? '#2357D9' : '#DCE3EC') };\n  }\n\n  renderVals() {\n    const s = this.st
